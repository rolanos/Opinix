services:
  opinix:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "8080:8080"
      - "8081:8081"

  client:
    ports:
      - "5001:3000"
  
  proxy:
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/ssl:ro   # <-- монтируем локальную папку ./certs
    ports:
    - "80:80"
    - "443:443"
      